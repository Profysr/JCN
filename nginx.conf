# Single entry point for the whole backend. Routes by path:
#   /ws/            → Daphne (ASGI, WebSocket only)
#   /static/ /media/ → served directly off disk (never touches Django/Gunicorn)
#   everything else  → Gunicorn (WSGI, all DRF views)
#
# See docker-compose.yml (backend / backend-ws services) and the comment in
# backend/core/wsgi.py for why HTTP and WebSocket traffic are split.

# Upgrade header is only sent by WebSocket handshakes. When absent, closing
# the connection (instead of forcing "upgrade") lets this map double as a
# guard against non-WS requests being proxied as if they were one.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Reused for both upstreams — `keepalive N` keeps a pool of already-open
# connections from nginx to the app servers instead of opening a new TCP
# connection per request (real win under load; Gunicorn/Daphne both support
# HTTP/1.1 keepalive).
upstream django_http {
    server backend:8000;
    keepalive 32;
}

upstream django_ws {
    server backend-ws:8001;
}

# django-admin login, dj-rest-auth login/registration — worth protecting from
# brute force independently of whatever throttling DRF does at the app layer,
# since nginx rejects excess requests before they even reach Gunicorn.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80 default_server;
    server_name _;

    # Reject requests with a Host header nginx wasn't configured for (protects
    # against Host-header-based attacks slipping past ALLOWED_HOSTS checks
    # that assume nginx already filtered garbage Hosts).
    return 444;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;   # task attachments / avatars — bump if needed

    # Compress JSON API responses and text assets; media (images/PDFs handled
    # by MEDIA_URL below) is already-compressed binary, so it's excluded.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/css text/plain application/xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── WebSocket — Daphne ────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://django_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets are long-lived — a short read timeout would kill idle
        # (but still connected) sockets.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Auth endpoints — Gunicorn, but rate-limited at the edge ────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://django_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";   # required for upstream keepalive to work
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static / media — served straight off the shared volumes, never
    # proxied to Django. STATIC_ROOT/MEDIA_ROOT in core/settings.py. Run
    # `python manage.py collectstatic` (or wire it into your deploy step)
    # before relying on /static/ in production — DEBUG=True dev mode doesn't
    # need it since Django's runserver serves static files itself.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # ── Everything else — Gunicorn ──────────────────────────────────────────
    location / {
        proxy_pass http://django_http;
        proxy_http_version 1.1;
        proxy_set_header Connection "";   # required for upstream keepalive to work
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ── HTTPS (enable once you have a cert / are behind a TLS-terminating LB) ──
# Uncomment and point at your cert paths, then redirect the `listen 80`
# server block above to 443 instead of serving plaintext directly:
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#
#     # ... same location blocks as the plaintext server above ...
# }
