services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: jcn_db
      POSTGRES_USER: jcn_user
      POSTGRES_PASSWORD: jcn_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol (Celery + Channels connect here)
      - "15672:15672"  # management UI (http://localhost:15672, guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Plain REST/HTTP traffic (all DRF views) — Gunicorn gives each request its
  # own worker process/thread, so one slow view never blocks the others.
  # `gthread` + `--threads` matters: the default `sync` worker class ignores
  # --threads entirely.
  # Sizing here is scaled DOWN for an 8GB dev machine running the whole stack
  # (postgres, redis, rabbitmq, 2 Django processes, celery, nginx) side by
  # side — 2 workers x 2 threads = 4 concurrent requests, ~2 processes' worth
  # of memory instead of 5. This is NOT sized for production: recompute
  # `--workers` against the ACTUAL deploy host's vCPU count (workers = vCPUs +
  # 1 is the I/O-bound starting point, not the CPU-bound (2 x cores) + 1
  # formula) once you know the real target hardware.
  backend:
    build: ./backend
    restart: always
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --worker-class gthread --timeout 60
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # WebSocket traffic only (WorkspaceConsumer) — Daphne/ASGI. Kept as a
  # separate process so it never competes with REST traffic for the same
  # thread_sensitive worker thread (see core/asgi.py and core/wsgi.py).
  backend-ws:
    build: ./backend
    restart: always
    command: daphne -b 0.0.0.0 -p 8001 core.asgi:application
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # Single entry point — routes /ws/ to Daphne, /static/ and /media/ straight
  # off disk, everything else to Gunicorn. See nginx.conf.
  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - staticfiles_data:/app/staticfiles:ro
    ports:
      - "8000:80"
    depends_on:
      - backend
      - backend-ws

  celery:
    build: ./backend
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  celery-beat:
    build: ./backend
    restart: always
    command: celery -A core beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  staticfiles_data:
  redis_data:
  rabbitmq_data:
