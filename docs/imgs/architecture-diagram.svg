<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b8ba0"/>
    </marker>
    <linearGradient id="nginxFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3550"/>
      <stop offset="100%" stop-color="#2a2640"/>
    </linearGradient>
    <linearGradient id="appFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3b52"/>
      <stop offset="100%" stop-color="#20293a"/>
    </linearGradient>
    <linearGradient id="dataFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3a3a"/>
      <stop offset="100%" stop-color="#152827"/>
    </linearGradient>
    <linearGradient id="workerFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2d2d"/>
      <stop offset="100%" stop-color="#291f1f"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="#0d0d14"/>

  <!-- client -->
  <text x="60" y="45" fill="#c8c8d8" font-size="16" font-weight="600">Client</text>
  <text x="60" y="65" fill="#8b8ba0" font-size="12">HTTP / WebSocket</text>
  <line x1="60" y1="80" x2="60" y2="120" stroke="#8b8ba0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- nginx -->
  <rect x="20" y="120" width="200" height="60" rx="10" fill="url(#nginxFill)" stroke="#5b5480" stroke-width="1.5"/>
  <text x="120" y="145" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Nginx</text>
  <text x="120" y="164" fill="#a8a2c0" font-size="11" text-anchor="middle">single entry point</text>

  <line x1="70" y1="180" x2="70" y2="230" stroke="#8b8ba0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="170" y1="180" x2="170" y2="230" stroke="#8b8ba0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- gunicorn -->
  <rect x="20" y="230" width="200" height="70" rx="10" fill="url(#appFill)" stroke="#4a6a8a" stroke-width="1.5"/>
  <text x="120" y="255" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Gunicorn (REST)</text>
  <text x="120" y="273" fill="#9ab4cc" font-size="11" text-anchor="middle">backend service</text>
  <text x="120" y="289" fill="#7590a8" font-size="10" text-anchor="middle">DRF views · gthread workers</text>

  <!-- daphne -->
  <rect x="260" y="230" width="200" height="70" rx="10" fill="url(#appFill)" stroke="#4a6a8a" stroke-width="1.5"/>
  <text x="360" y="255" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Daphne (ASGI)</text>
  <text x="360" y="273" fill="#9ab4cc" font-size="11" text-anchor="middle">backend-ws service</text>
  <text x="360" y="289" fill="#7590a8" font-size="10" text-anchor="middle">WorkspaceConsumer · WebSockets</text>

  <!-- convergence to data layer -->
  <line x1="120" y1="300" x2="120" y2="330" stroke="#8b8ba0" stroke-width="2"/>
  <line x1="360" y1="300" x2="360" y2="330" stroke="#8b8ba0" stroke-width="2"/>
  <line x1="120" y1="330" x2="360" y2="330" stroke="#8b8ba0" stroke-width="2"/>
  <line x1="240" y1="330" x2="240" y2="360" stroke="#8b8ba0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- data layer -->
  <rect x="40" y="360" width="150" height="65" rx="10" fill="url(#dataFill)" stroke="#3a7a6a" stroke-width="1.5"/>
  <text x="115" y="388" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">PostgreSQL</text>
  <text x="115" y="405" fill="#8fc4b4" font-size="10" text-anchor="middle">primary datastore</text>

  <rect x="205" y="360" width="150" height="65" rx="10" fill="url(#dataFill)" stroke="#3a7a6a" stroke-width="1.5"/>
  <text x="280" y="388" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Redis</text>
  <text x="280" y="405" fill="#8fc4b4" font-size="10" text-anchor="middle">cache · channel layer</text>

  <rect x="370" y="360" width="150" height="65" rx="10" fill="url(#dataFill)" stroke="#3a7a6a" stroke-width="1.5"/>
  <text x="445" y="388" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">RabbitMQ</text>
  <text x="445" y="405" fill="#8fc4b4" font-size="10" text-anchor="middle">Celery broker</text>

  <!-- rabbitmq to workers -->
  <line x1="445" y1="425" x2="445" y2="460" stroke="#8b8ba0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- celery workers -->
  <rect x="345" y="460" width="200" height="70" rx="10" fill="url(#workerFill)" stroke="#8a5a4a" stroke-width="1.5"/>
  <text x="445" y="486" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Celery worker</text>
  <text x="445" y="504" fill="#ccaa9a" font-size="11" text-anchor="middle">background tasks</text>
  <text x="445" y="520" fill="#a68a7a" font-size="10" text-anchor="middle">Celery beat · scheduled jobs</text>

  <!-- legend / notes -->
  <text x="60" y="565" fill="#6f6f82" font-size="12">REST traffic and WebSocket traffic run as separate processes —</text>
  <text x="60" y="583" fill="#6f6f82" font-size="12">a slow WebSocket connection never blocks a REST worker thread, and vice versa.</text>
  <text x="60" y="601" fill="#6f6f82" font-size="12">See nginx.conf for routing and docker-compose.yml for worker sizing notes.</text>
</svg>
